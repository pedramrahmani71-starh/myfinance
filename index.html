<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>داشبورد مالی پویا</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #0b0e14; color: #e8edf5; padding: 20px; max-width: 600px; margin: 0 auto; direction: rtl; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; background: #161b24; padding: 16px 20px; border-radius: 20px; box-shadow: 0 8px 24px rgba(0,0,0,0.6); }
        .header h1 { font-size: 20px; font-weight: 300; letter-spacing: 1px; }
        .header .badge { background: #2d3748; padding: 6px 14px; border-radius: 30px; font-size: 12px; color: #a0b4c8; }
        .card { background: #161b24; border-radius: 20px; padding: 20px; margin-bottom: 16px; box-shadow: 0 8px 24px rgba(0,0,0,0.5); border: 1px solid #1e2630; }
        .card h3 { font-size: 14px; color: #8899aa; margin-bottom: 6px; font-weight: 400; }
        .card .value { font-size: 32px; font-weight: 700; direction: ltr; text-align: left; background: linear-gradient(135deg, #f0f4fa, #b0c4db); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .input-row { display: flex; gap: 10px; margin-top: 14px; }
        .input-row input { flex: 1; padding: 12px 16px; border: none; border-radius: 14px; background: #1e2630; color: #e8edf5; font-size: 16px; text-align: center; outline: none; border: 1px solid transparent; }
        .input-row input:focus { border-color: #3b82f6; background: #232b36; }
        .input-row button { padding: 12px 22px; border: none; border-radius: 14px; background: linear-gradient(135deg, #3b82f6, #2563eb); color: #fff; font-weight: 600; cursor: pointer; transition: 0.2s; font-size: 14px; box-shadow: 0 4px 12px rgba(59,130,246,0.3); }
        .input-row button:hover { transform: scale(1.02); box-shadow: 0 6px 16px rgba(59,130,246,0.4); }
        .input-row button.remove-btn { background: linear-gradient(135deg, #ef4444, #dc2626) !important; box-shadow: 0 4px 12px rgba(239,68,68,0.3) !important; }
        .total { background: #1a232e; padding: 16px; border-radius: 16px; text-align: center; font-size: 18px; font-weight: 600; margin-top: 12px; border: 1px solid #2d3748; }
        .rate-box { background: #0f151e; padding: 12px 16px; border-radius: 16px; text-align: center; margin-bottom: 16px; font-size: 14px; color: #8899aa; border: 1px solid #1e2630; }
        .rate-box span { color: #4ade80; font-weight: 700; }
        .chart-container { height: 140px; margin: 12px 0 8px; }
        .history-list { max-height: 200px; overflow-y: auto; margin-top: 10px; border-top: 1px solid #1e2630; padding-top: 10px; }
        .history-item { display: flex; justify-content: space-between; padding: 8px 4px; border-bottom: 1px solid #1a232e; font-size: 14px; color: #b0c4db; }
        .history-item .amount { font-weight: 600; color: #e8edf5; }
        .history-item .date { color: #6a7b8c; font-size: 12px; }
        .empty-history { color: #6a7b8c; text-align: center; padding: 16px 0; font-size: 14px; }
        .btn-danger { background: linear-gradient(135deg, #ef4444, #dc2626) !important; box-shadow: 0 4px 12px rgba(239,68,68,0.3) !important; }
        .flex-row { display: flex; gap: 10px; margin-top: 12px; }
        .flex-row button { flex: 1; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #0b0e14; }
        ::-webkit-scrollbar-thumb { background: #2d3748; border-radius: 10px; }
        .rial-rate-note { font-size: 12px; color: #6a7b8c; margin-top: 4px; text-align: center; }
        .add-currency-section { display: flex; gap: 10px; margin-top: 12px; }
        .add-currency-section input { flex: 1; padding: 12px 16px; border: none; border-radius: 14px; background: #1e2630; color: #e8edf5; font-size: 16px; outline: none; border: 1px solid transparent; }
        .add-currency-section input:focus { border-color: #3b82f6; background: #232b36; }
        .add-currency-section button { padding: 12px 22px; border: none; border-radius: 14px; background: linear-gradient(135deg, #10b981, #059669); color: #fff; font-weight: 600; cursor: pointer; transition: 0.2s; font-size: 14px; box-shadow: 0 4px 12px rgba(16,185,129,0.3); }
        .add-currency-section button:hover { transform: scale(1.02); }
    </style>
</head>
<body>

<div class="header">
    <h1>📊 دارایی‌های من</h1>
    <span class="badge">لحظه‌ای</span>
</div>

<div class="rate-box" id="rateDisplay">
    📈 در حال دریافت نرخ ارزها...
</div>

<div class="card" style="padding-bottom: 8px;">
    <div class="chart-container">
        <canvas id="portfolioChart"></canvas>
    </div>
</div>

<!-- بخش ارزها (دینامیک) -->
<div id="currenciesContainer"></div>

<!-- مجموع -->
<div class="total" id="total-display">
    مجموع (تومان): ۰ | مجموع (تتر): ۰
</div>
<div class="rial-rate-note">
    💡 نرخ ریال: ۵۸,۰۰۰ تومان (دستی)
</div>

<!-- افزودن ارز جدید -->
<div class="card" style="margin-top: 8px;">
    <h3>➕ افزودن ارز جدید</h3>
    <div class="add-currency-section">
        <input type="text" id="newCurrencyInput" placeholder="مثال: dogecoin, cardano, solana">
        <button onclick="addNewCurrency()">افزودن</button>
    </div>
    <div style="font-size:12px; color:#6a7b8c; margin-top:6px;">
        🟢 شناسه ارز رو از <a href="https://api.coingecko.com/api/v3/coins/list" target="_blank" style="color:#3b82f6;">لیست CoinGecko</a> پیدا کن.
    </div>
</div>

<div class="flex-row">
    <button onclick="clearAllData()" class="btn-danger" style="padding:12px;border:none;border-radius:14px;color:#fff;font-weight:600;cursor:pointer;">🗑️ پاک کردن همه</button>
</div>

<!-- تاریخچه -->
<div class="card" style="margin-top:8px;">
    <h3>📜 تاریخچه تراکنش‌ها</h3>
    <div id="historyContainer" class="history-list">
        <div class="empty-history">هیچ تراکنشی ثبت نشده</div>
    </div>
</div>

<script>
    // ---------- وضعیت اولیه ----------
    let currencies = [
        { id: 'rial', label: 'ریال', symbol: '🇮🇷', amount: 0, isCrypto: false },
        { id: 'usdt', label: 'تتر', symbol: '₿', amount: 0, isCrypto: true },
        { id: 'bitcoin', label: 'بیت‌کوین', symbol: '₿', amount: 0, isCrypto: true },
        { id: 'ethereum', label: 'اتریوم', symbol: '⟠', amount: 0, isCrypto: true }
    ];
    let prices = {};
    const rialRate = 58000;
    let transactions = [];
    let chartInstance = null;
    let priceInterval = null;

    // ---------- دریافت نرخ از CoinGecko ----------
    async function fetchRates() {
        const cryptoIds = currencies.filter(c => c.isCrypto).map(c => c.id).join(',');
        if (!cryptoIds) return;
        try {
            const response = await fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${cryptoIds}&vs_currencies=usd`);
            const data = await response.json();
            for (let id in data) {
                prices[id] = data[id].usd || 0;
            }
            updateRateDisplay();
        } catch (error) {
            document.getElementById('rateDisplay').innerHTML = '⚠️ عدم دریافت نرخ لحظه‌ای';
            console.log('خطا در دریافت نرخ:', error);
        }
    }

    function updateRateDisplay() {
        let html = '';
        for (let c of currencies) {
            if (c.isCrypto && prices[c.id]) {
                html += `${c.symbol} ${c.label}: <span>$${prices[c.id].toLocaleString()}</span> | `;
            }
        }
        document.getElementById('rateDisplay').innerHTML = html || '📈 در حال دریافت نرخ...';
    }

    // ---------- ذخیره و بازیابی ----------
    function saveData() {
        const data = {
            currencies: currencies,
            transactions: transactions
        };
        localStorage.setItem('portfolio_data', JSON.stringify(data));
    }

    function loadData() {
        const saved = localStorage.getItem('portfolio_data');
        if (saved) {
            try {
                const data = JSON.parse(saved);
                currencies = data.currencies;
                transactions = data.transactions || [];
            } catch (e) {
                console.log('خطا در بارگذاری داده');
            }
        }
    }

    // ---------- رندر کردن کارت‌ها ----------
    function renderCurrencies() {
        const container = document.getElementById('currenciesContainer');
        container.innerHTML = '';
        for (let i = 0; i < currencies.length; i++) {
            const c = currencies[i];
            const card = document.createElement('div');
            card.className = 'card';
            card.id = `card-${c.id}`;
            card.innerHTML = `
                <h3>${c.symbol} ${c.label}</h3>
                <div class="value" id="value-${c.id}">${c.amount.toLocaleString()}</div>
                <div class="input-row">
                    <input type="number" id="input-${c.id}" placeholder="مقدار ${c.label}">
                    <button onclick="addTransaction('${c.id}')">ثبت</button>
                    ${currencies.length > 1 ? `<button class="remove-btn" onclick="removeCurrency('${c.id}')">🗑️</button>` : ''}
                </div>
            `;
            container.appendChild(card);
        }
        updateTotal();
        updateHistory();
        updateChart();
        saveData();
    }

    // ---------- افزودن/حذف ارز ----------
    function addNewCurrency() {
        const input = document.getElementById('newCurrencyInput');
        const id = input.value.trim().toLowerCase();
        if (!id) return alert('لطفاً شناسه ارز رو وارد کن');
        if (currencies.find(c => c.id === id)) return alert('این ارز قبلاً اضافه شده');
        
        // دریافت اطلاعات ارز از CoinGecko
        fetch(`https://api.coingecko.com/api/v3/coins/${id}`)
            .then(res => res.json())
            .then(data => {
                const symbol = data.symbol ? data.symbol.toUpperCase() : id.slice(0, 3).toUpperCase();
                currencies.push({
                    id: id,
                    label: data.name || id,
                    symbol: symbol,
                    amount: 0,
                    isCrypto: true
                });
                input.value = '';
                renderCurrencies();
                fetchRates();
            })
            .catch(() => {
                alert('ارز پیدا نشد! شناسه رو چک کن.');
            });
    }

    function removeCurrency(id) {
        if (currencies.length <= 1) return alert('حداقل یک ارز باید باقی بمونه');
        if (!confirm(`ارز ${id} حذف بشه؟`)) return;
        currencies = currencies.filter(c => c.id !== id);
        renderCurrencies();
        fetchRates();
    }

    // ---------- تراکنش ----------
    function addTransaction(id) {
        const currency = currencies.find(c => c.id === id);
        if (!currency) return;
        const input = document.getElementById(`input-${id}`);
        const amount = parseFloat(input.value);
        if (!amount || amount <= 0) return alert('مقدار معتبر وارد کن');
        currency.amount += amount;
        input.value = '';
        transactions.push({
            label: `${currency.symbol} ${currency.label} +${amount.toLocaleString()}`,
            amount: amount,
            date: new Date().toLocaleString('fa-IR')
        });
        renderCurrencies();
    }

    // ---------- محاسبه مجموع ----------
    function updateTotal() {
        let totalUsd = 0;
        for (let c of currencies) {
            if (c.id === 'rial') {
                totalUsd += c.amount / rialRate;
            } else if (c.isCrypto && prices[c.id]) {
                totalUsd += c.amount * prices[c.id];
            } else if (c.id === 'usdt') {
                totalUsd += c.amount * 1;
            }
        }
        const totalRial = totalUsd * rialRate;
        document.getElementById('total-display').textContent = 
            `مجموع (تومان): ${totalRial.toLocaleString()} | مجموع (تتر): ${totalUsd.toFixed(2)}`;
    }

    // ---------- تاریخچه ----------
    function updateHistory() {
        const container = document.getElementById('historyContainer');
        if (transactions.length === 0) {
            container.innerHTML = '<div class="empty-history">هیچ تراکنشی ثبت نشده</div>';
            return;
        }
        let html = '';
        const reversed = [...transactions].reverse().slice(0, 15);
        for (let t of reversed) {
            html += `
                <div class="history-item">
                    <span>${t.label}</span>
                    <span>
                        <span class="amount">${t.amount.toLocaleString()}</span>
                        <span class="date">${t.date}</span>
                    </span>
                </div>
            `;
        }
        container.innerHTML = html;
    }

    // ---------- نمودار ----------
    function updateChart() {
        const ctx = document.getElementById('portfolioChart').getContext('2d');
        const data = [];
        const labels = [];
        const colors = ['#f59e0b', '#26a17b', '#f7931a', '#627eea', '#8b5cf6', '#ec4899', '#14b8a6', '#f97316'];
        
        for (let i = 0; i < currencies.length; i++) {
            const c = currencies[i];
            let value = 0;
            if (c.id === 'rial') {
                value = c.amount / rialRate;
            } else if (c.isCrypto && prices[c.id]) {
                value = c.amount * prices[c.id];
            } else if (c.id === 'usdt') {
                value = c.amount * 1;
            }
            if (value > 0) {
                data.push(value);
                labels.push(c.label);
            }
        }

        if (chartInstance) chartInstance.destroy();
        if (data.length === 0) {
            chartInstance = new Chart(ctx, {
                type: 'doughnut',
                data: { labels: ['بدون داده'], datasets: [{ data: [1], backgroundColor: ['#2d3748'] }] },
                options: { cutout: '70%', plugins: { legend: { display: false } } }
            });
            return;
        }

        chartInstance = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: labels,
                datasets: [{
                    data: data,
                    backgroundColor: colors.slice(0, data.length),
                    borderColor: '#0b0e14',
                    borderWidth: 2,
                    hoverOffset: 8
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: {
                        position: 'bottom',
                        labels: {
                            color: '#b0c4db',
                            font: { size: 11 },
                            boxWidth: 12,
                            padding: 12
                        }
                    }
                },
                cutout: '70%'
            }
        });
    }

    // ---------- پاک کردن ----------
    function clearAllData() {
        if (!confirm('همه داده‌ها پاک میشن؟')) return;
        for (let c of currencies) c.amount = 0;
        transactions = [];
        localStorage.clear();
        renderCurrencies();
        document.querySelectorAll('.input-row input').forEach(inp => inp.value = '');
    }

    // ---------- شروع ----------
    loadData();
    renderCurrencies();
    fetchRates();
    // به‌روزرسانی هر ۶۰ ثانیه
    priceInterval = setInterval(fetchRates, 60000);
</script>
</body>
</html>
