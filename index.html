
<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>داشبورد مالی حرفه‌ای</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* همه‌ی استایل‌های قبلی رو همینجا کپی کن (همونی که قبلاً داشتی) */
        /* برای اختصار، استایل‌ها رو دوباره نمینویسم، ولی تو کد کاملت باید باشن */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #0b0e14; color: #e8edf5; padding: 20px; max-width: 600px; margin: 0 auto; direction: rtl; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; background: #161b24; padding: 16px 20px; border-radius: 20px; box-shadow: 0 8px 24px rgba(0,0,0,0.6); }
        .header h1 { font-size: 20px; font-weight: 300; letter-spacing: 1px; }
        .header .badge { background: #2d3748; padding: 6px 14px; border-radius: 30px; font-size: 12px; color: #a0b4c8; }
        .card { background: #161b24; border-radius: 20px; padding: 20px; margin-bottom: 16px; box-shadow: 0 8px 24px rgba(0,0,0,0.5); border: 1px solid #1e2630; }
        .card h3 { font-size: 14px; color: #8899aa; margin-bottom: 6px; font-weight: 400; }
        .card .value { font-size: 32px; font-weight: 700; direction: ltr; text-align: left; background: linear-gradient(135deg, #f0f4fa, #b0c4db); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .input-row { display: flex; gap: 10px; margin-top: 14px; }
        .input-row input { flex: 1; padding: 12px 16px; border: none; border-radius: 14px; background: #1e2630; color: #e8edf5; font-size: 16px; text-align: center; outline: none; border: 1px solid transparent; }
        .input-row input:focus { border-color: #3b82f6; background: #232b36; }
        .input-row button { padding: 12px 22px; border: none; border-radius: 14px; background: linear-gradient(135deg, #3b82f6, #2563eb); color: #fff; font-weight: 600; cursor: pointer; transition: 0.2s; font-size: 14px; box-shadow: 0 4px 12px rgba(59,130,246,0.3); }
        .input-row button:hover { transform: scale(1.02); box-shadow: 0 6px 16px rgba(59,130,246,0.4); }
        .total { background: #1a232e; padding: 16px; border-radius: 16px; text-align: center; font-size: 20px; font-weight: 600; margin-top: 12px; border: 1px solid #2d3748; }
        .rate-box { background: #0f151e; padding: 12px 16px; border-radius: 16px; text-align: center; margin-bottom: 16px; font-size: 14px; color: #8899aa; border: 1px solid #1e2630; }
        .rate-box span { color: #4ade80; font-weight: 700; }
        .chart-container { height: 140px; margin: 12px 0 8px; }
        .history-list { max-height: 200px; overflow-y: auto; margin-top: 10px; border-top: 1px solid #1e2630; padding-top: 10px; }
        .history-item { display: flex; justify-content: space-between; padding: 8px 4px; border-bottom: 1px solid #1a232e; font-size: 14px; color: #b0c4db; }
        .history-item .amount { font-weight: 600; color: #e8edf5; }
        .history-item .date { color: #6a7b8c; font-size: 12px; }
        .empty-history { color: #6a7b8c; text-align: center; padding: 16px 0; font-size: 14px; }
        .btn-danger { background: linear-gradient(135deg, #ef4444, #dc2626) !important; box-shadow: 0 4px 12px rgba(239,68,68,0.3) !important; }
        .flex-row { display: flex; gap: 10px; margin-top: 12px; }
        .flex-row button { flex: 1; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #0b0e14; }
        ::-webkit-scrollbar-thumb { background: #2d3748; border-radius: 10px; }
    </style>
</head>
<body>

<div class="header">
    <h1>📊 دارایی‌ها</h1>
    <span class="badge">لحظه‌ای</span>
</div>

<div class="rate-box" id="rateDisplay">
    📈 در حال دریافت نرخ ارز...
</div>

<div class="card" style="padding-bottom: 8px;">
    <div class="chart-container">
        <canvas id="portfolioChart"></canvas>
    </div>
</div>

<div class="card">
    <h3>🇺🇸 دلار آمریکا</h3>
    <div class="value" id="usd-value">۰</div>
    <div class="input-row">
        <input type="number" id="usd-input" placeholder="مبلغ دلار">
        <button onclick="addTransaction('usd')">ثبت</button>
    </div>
</div>

<div class="card">
    <h3>🇮🇷 ریال ایران</h3>
    <div class="value" id="rial-value">۰</div>
    <div class="input-row">
        <input type="number" id="rial-input" placeholder="مبلغ ریال">
        <button onclick="addTransaction('rial')">ثبت</button>
    </div>
</div>

<div class="card">
    <h3>₿ تتر (USDT)</h3>
    <div class="value" id="crypto-value">۰</div>
    <div class="input-row">
        <input type="number" id="crypto-input" placeholder="مبلغ تتر">
        <button onclick="addTransaction('crypto')">ثبت</button>
    </div>
</div>

<div class="total" id="total-display">
    مجموع (تومان): ۰
</div>

<div class="flex-row">
    <button onclick="clearAllData()" class="btn-danger" style="padding:12px;border:none;border-radius:14px;color:#fff;font-weight:600;cursor:pointer;">🗑️ پاک کردن همه</button>
</div>

<div class="card" style="margin-top:8px;">
    <h3>📜 تاریخچه تراکنش‌ها</h3>
    <div id="historyContainer" class="history-list">
        <div class="empty-history">هیچ تراکنشی ثبت نشده</div>
    </div>
</div>

<script>
    let usd = 0, rial = 0, crypto = 0;
    let dollarRate = 58000;
    let tetherRate = 58000;
    let transactions = [];
    let chartInstance = null;

    // ---------- دریافت نرخ از API Nobitex ----------
    async function fetchRates() {
        try {
            // دریافت نرخ دلار و تتر از نوبیتکس
            const response = await fetch('https://api.nobitex.ir/v2/orderbook/USDTIRT');
            const data = await response.json();
            
            // نرخ خرید تتر به تومان (آخرین معامله)
            if (data.lastTradePrice) {
                const price = parseFloat(data.lastTradePrice);
                dollarRate = Math.round(price);
                tetherRate = Math.round(price);
                
                document.getElementById('rateDisplay').innerHTML = 
                    `💵 دلار: <span>${dollarRate.toLocaleString()}</span> تومان | ₿ تتر: <span>${tetherRate.toLocaleString()}</span> تومان`;
            } else {
                throw new Error('نرخ دریافت نشد');
            }
        } catch (error) {
            // در صورت خطا، از نرخ پیش‌فرض استفاده کن
            document.getElementById('rateDisplay').innerHTML = 
                '⚠️ عدم دریافت نرخ لحظه‌ای (استفاده از نرخ پیش‌فرض)';
            console.log('خطا در دریافت نرخ:', error);
        }
    }

    // ---------- ذخیره و بازیابی از localStorage ----------
    function saveData() {
        localStorage.setItem('portfolio_usd', usd);
        localStorage.setItem('portfolio_rial', rial);
        localStorage.setItem('portfolio_crypto', crypto);
        localStorage.setItem('transactions', JSON.stringify(transactions));
    }

    function loadData() {
        const savedUsd = localStorage.getItem('portfolio_usd');
        const savedRial = localStorage.getItem('portfolio_rial');
        const savedCrypto = localStorage.getItem('portfolio_crypto');
        const savedTransactions = localStorage.getItem('transactions');
        if (savedUsd) usd = parseFloat(savedUsd) || 0;
        if (savedRial) rial = parseFloat(savedRial) || 0;
        if (savedCrypto) crypto = parseFloat(savedCrypto) || 0;
        if (savedTransactions) transactions = JSON.parse(savedTransactions) || [];
    }

    function updateUI() {
        document.getElementById('usd-value').textContent = usd.toLocaleString();
        document.getElementById('rial-value').textContent = rial.toLocaleString();
        document.getElementById('crypto-value').textContent = crypto.toLocaleString();
        updateTotal();
        updateHistory();
        updateChart();
        saveData();
    }

    function updateTotal() {
        const totalToman = (usd * dollarRate) + rial + (crypto * tetherRate);
        document.getElementById('total-display').textContent = 
            `مجموع (تومان): ${totalToman.toLocaleString()}`;
    }

    function addTransaction(type) {
        let input, amount, label;
        if (type === 'usd') {
            input = document.getElementById('usd-input');
            amount = parseFloat(input.value);
            if (!amount || amount <= 0) return alert('مبلغ معتبر وارد کن');
            usd += amount;
            label = `🇺🇸 دلار +${amount.toLocaleString()}`;
        } else if (type === 'rial') {
            input = document.getElementById('rial-input');
            amount = parseFloat(input.value);
            if (!amount || amount <= 0) return alert('مبلغ معتبر وارد کن');
            rial += amount;
            label = `🇮🇷 ریال +${amount.toLocaleString()}`;
        } else if (type === 'crypto') {
            input = document.getElementById('crypto-input');
            amount = parseFloat(input.value);
            if (!amount || amount <= 0) return alert('مبلغ معتبر وارد کن');
            crypto += amount;
            label = `₿ تتر +${amount.toLocaleString()}`;
        }
        input.value = '';
        transactions.push({ label, amount, date: new Date().toLocaleString('fa-IR') });
        updateUI();
    }

    function updateHistory() {
        const container = document.getElementById('historyContainer');
        if (transactions.length === 0) {
            container.innerHTML = '<div class="empty-history">هیچ تراکنشی ثبت نشده</div>';
            return;
        }
        let html = '';
        const reversed = [...transactions].reverse().slice(0, 15);
        for (let t of reversed) {
            html += `
                <div class="history-item">
                    <span>${t.label}</span>
                    <span>
                        <span class="amount">${t.amount.toLocaleString()}</span>
                        <span class="date">${t.date}</span>
                    </span>
                </div>
            `;
        }
        container.innerHTML = html;
    }

    function updateChart() {
        const ctx = document.getElementById('portfolioChart').getContext('2d');
        const data = [usd * dollarRate, rial, crypto * tetherRate];
        const labels = ['دلار', 'ریال', 'تتر'];
        const colors = ['#3b82f6', '#f59e0b', '#10b981'];

        if (chartInstance) chartInstance.destroy();

        chartInstance = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: labels,
                datasets: [{
                    data: data,
                    backgroundColor: colors,
                    borderColor: '#0b0e14',
                    borderWidth: 2,
                    hoverOffset: 8
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: {
                        position: 'bottom',
                        labels: {
                            color: '#b0c4db',
                            font: { size: 11 },
                            boxWidth: 12,
                            padding: 12
                        }
                    }
                },
                cutout: '70%'
            }
        });
    }

    function clearAllData() {
        if (!confirm('همه داده‌ها پاک میشن، مطمئنی؟')) return;
        usd = 0; rial = 0; crypto = 0;
        transactions = [];
        localStorage.clear();
        updateUI();
        document.getElementById('usd-input').value = '';
        document.getElementById('rial-input').value = '';
        document.getElementById('crypto-input').value = '';
    }

    // ---------- شروع ----------
    loadData();
    fetchRates();
    updateUI();
</script>
</body>
</html>
