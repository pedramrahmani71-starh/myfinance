<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>کیف پول من</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;700;900&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Vazirmatn', sans-serif;
            background: #0a0c12;
            color: #e8edf5;
            min-height: 100vh;
            padding: 0 0 80px 0;
            direction: rtl;
        }
        /* هدر شیشه‌ای */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 20px 12px 20px;
            background: rgba(10, 12, 18, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header h1 {
            font-size: 20px;
            font-weight: 700;
            color: #fff;
            letter-spacing: -0.5px;
        }
        .header .badge {
            background: rgba(74, 222, 128, 0.15);
            color: #4ade80;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 11px;
            font-weight: 500;
            border: 1px solid rgba(74, 222, 128, 0.2);
        }
        .header .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 16px;
            color: #fff;
            box-shadow: 0 4px 16px rgba(59,130,246,0.3);
        }
        /* صفحات */
        .page {
            display: none;
            padding: 16px 16px 20px 16px;
            animation: fadeIn 0.35s ease;
        }
        .page.active {
            display: block;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
        /* کارت‌ها (سبک والت) */
        .card {
            background: rgba(22, 27, 36, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 14px;
            border: 1px solid rgba(255,255,255,0.06);
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            transition: all 0.2s;
        }
        .card:hover {
            border-color: rgba(255,255,255,0.1);
        }
        .card h3 {
            font-size: 13px;
            color: #8899aa;
            margin-bottom: 4px;
            font-weight: 400;
            letter-spacing: 0.3px;
        }
        .card .value {
            font-size: 30px;
            font-weight: 700;
            direction: ltr;
            text-align: left;
            color: #fff;
            letter-spacing: -0.5px;
        }
        .card .value .currency-symbol {
            font-size: 18px;
            color: #8899aa;
            margin-right: 4px;
        }
        .input-row {
            display: flex;
            gap: 8px;
            margin-top: 14px;
            flex-wrap: wrap;
        }
        .input-row input {
            flex: 2;
            padding: 12px 16px;
            border: none;
            border-radius: 16px;
            background: rgba(30, 38, 48, 0.6);
            color: #e8edf5;
            font-size: 15px;
            text-align: center;
            outline: none;
            border: 1px solid transparent;
            min-width: 100px;
            font-family: 'Vazirmatn', sans-serif;
        }
        .input-row input:focus {
            border-color: #3b82f6;
            background: rgba(35, 43, 54, 0.8);
        }
        .input-row .btn-group {
            display: flex;
            gap: 6px;
            flex: 1;
        }
        .input-row button {
            padding: 12px 16px;
            border: none;
            border-radius: 16px;
            color: #fff;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 13px;
            flex: 1;
            font-family: 'Vazirmatn', sans-serif;
        }
        .input-row button.deposit {
            background: linear-gradient(135deg, #10b981, #059669);
            box-shadow: 0 4px 16px rgba(16,185,129,0.25);
        }
        .input-row button.deposit:active { transform: scale(0.96); }
        .input-row button.withdraw {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            box-shadow: 0 4px 16px rgba(239,68,68,0.2);
        }
        .input-row button.withdraw:active { transform: scale(0.96); }
        .input-row button.remove-btn {
            background: rgba(107, 114, 128, 0.5);
            flex: 0.4;
            backdrop-filter: blur(8px);
        }
        /* مجموع */
        .total {
            background: linear-gradient(135deg, rgba(16,185,129,0.1), rgba(59,130,246,0.05));
            padding: 18px 20px;
            border-radius: 24px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.06);
            margin-top: 8px;
            backdrop-filter: blur(8px);
        }
        .total .amount {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #4ade80, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .total .label {
            font-size: 14px;
            color: #8899aa;
        }
        .total .sub {
            font-size: 14px;
            color: #6a7b8c;
            margin-top: 4px;
        }
        .rate-box {
            background: rgba(15, 21, 30, 0.6);
            backdrop-filter: blur(8px);
            padding: 12px 16px;
            border-radius: 20px;
            text-align: center;
            margin-bottom: 16px;
            font-size: 13px;
            color: #8899aa;
            border: 1px solid rgba(255,255,255,0.04);
        }
        .rate-box span {
            color: #4ade80;
            font-weight: 600;
        }
        .chart-container {
            height: 150px;
            margin: 4px 0 0 0;
        }
        .history-list {
            max-height: 260px;
            overflow-y: auto;
            margin-top: 8px;
            padding-top: 8px;
        }
        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 4px;
            border-bottom: 1px solid rgba(255,255,255,0.04);
            font-size: 14px;
            color: #b0c4db;
        }
        .history-item .amount {
            font-weight: 600;
            color: #e8edf5;
        }
        .history-item .date {
            color: #6a7b8c;
            font-size: 11px;
            margin-right: 8px;
        }
        .history-item .withdraw-amount {
            color: #ef4444;
        }
        .history-item .deposit-amount {
            color: #10b981;
        }
        .empty-history {
            color: #6a7b8c;
            text-align: center;
            padding: 24px 0;
            font-size: 14px;
        }
        .btn-danger {
            background: linear-gradient(135deg, #ef4444, #dc2626) !important;
            box-shadow: 0 4px 16px rgba(239,68,68,0.2) !important;
            font-family: 'Vazirmatn', sans-serif;
        }
        .flex-row {
            display: flex;
            gap: 10px;
            margin-top: 12px;
        }
        .flex-row button {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 18px;
            color: #fff;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            font-family: 'Vazirmatn', sans-serif;
        }
        .flex-row button:active { transform: scale(0.96); }
        .add-currency-section {
            display: flex;
            gap: 10px;
            margin-top: 12px;
        }
        .add-currency-section input {
            flex: 1;
            padding: 12px 16px;
            border: none;
            border-radius: 16px;
            background: rgba(30, 38, 48, 0.6);
            color: #e8edf5;
            font-size: 15px;
            outline: none;
            border: 1px solid transparent;
            font-family: 'Vazirmatn', sans-serif;
        }
        .add-currency-section input:focus {
            border-color: #8b5cf6;
            background: rgba(35, 43, 54, 0.8);
        }
        .add-currency-section button {
            padding: 12px 22px;
            border: none;
            border-radius: 16px;
            background: linear-gradient(135deg, #8b5cf6, #7c3aed);
            color: #fff;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            font-size: 14px;
            box-shadow: 0 4px 16px rgba(139,92,246,0.25);
            font-family: 'Vazirmatn', sans-serif;
        }
        .add-currency-section button:active { transform: scale(0.96); }
        .hint {
            font-size: 11px;
            color: #6a7b8c;
            margin-top: 6px;
        }
        .hint a {
            color: #3b82f6;
            text-decoration: none;
        }
        /* منوی پایین (شیشه‌ای) */
        .bottom-nav {
            position: fixed;
            bottom: 12px;
            left: 12px;
            right: 12px;
            background: rgba(15, 21, 30, 0.85);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-radius: 28px;
            border: 1px solid rgba(255,255,255,0.06);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 6px 0;
            z-index: 1000;
            box-shadow: 0 8px 40px rgba(0,0,0,0.6);
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #6a7b8c;
            font-size: 10px;
            transition: 0.2s;
            cursor: pointer;
            padding: 6px 12px;
            border-radius: 20px;
            position: relative;
            min-width: 60px;
        }
        .nav-item i {
            font-size: 20px;
            margin-bottom: 0px;
            transition: 0.2s;
        }
        .nav-item span {
            font-weight: 500;
            font-size: 10px;
            margin-top: 1px;
        }
        .nav-item.active {
            color: #4ade80;
            background: rgba(74, 222, 128, 0.08);
        }
        .nav-item.active i {
            transform: translateY(-2px);
            filter: drop-shadow(0 0 12px rgba(74,222,128,0.2));
        }
        .nav-item .badge-dot {
            position: absolute;
            top: 2px;
            right: 6px;
            width: 7px;
            height: 7px;
            background: #ef4444;
            border-radius: 50%;
            border: 2px solid rgba(15, 21, 30, 0.85);
        }
        /* اسکرول */
        ::-webkit-scrollbar {
            width: 3px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #2d3748;
            border-radius: 10px;
        }
        @media (max-width: 480px) {
            .input-row {
                flex-direction: column;
            }
            .input-row input {
                width: 100%;
            }
            .input-row .btn-group {
                width: 100%;
            }
            .header h1 {
                font-size: 17px;
            }
            .bottom-nav {
                padding: 4px 0;
            }
            .nav-item {
                min-width: 50px;
                padding: 4px 8px;
            }
            .nav-item i {
                font-size: 18px;
            }
        }
    </style>
</head>
<body>

<!-- هدر -->
<div class="header">
    <div>
        <h1>💰 کیف پول</h1>
        <span class="badge">حرفه‌ای</span>
    </div>
    <div class="avatar">پ</div>
</div>

<!-- ========== صفحه ۱: خانه ========== -->
<div id="page-home" class="page active">
    <div class="rate-box" id="rateDisplay">
        📈 در حال دریافت نرخ ارزها...
    </div>
    
    <div class="card" style="padding-bottom: 6px;">
        <div class="chart-container">
            <canvas id="portfolioChart"></canvas>
        </div>
    </div>

    <div class="total">
        <div class="label">مجموع دارایی</div>
        <div class="amount" id="totalRial">۰</div>
        <div class="sub" id="totalUsd">≈ ۰ تتر</div>
    </div>
</div>

<!-- ========== صفحه ۲: کیف پول ========== -->
<div id="page-wallet" class="page">
    <div id="currenciesContainer"></div>
    
    <div class="card" style="margin-top: 8px;">
        <h3>➕ افزودن ارز جدید</h3>
        <div class="add-currency-section">
            <input type="text" id="newCurrencyInput" placeholder="مثال: dogecoin, cardano">
            <button onclick="addNewCurrency()">افزودن</button>
        </div>
        <div class="hint">
            🟢 شناسه ارز رو از <a href="https://api.coingecko.com/api/v3/coins/list" target="_blank">لیست CoinGecko</a> پیدا کن.
        </div>
    </div>
    
    <div class="flex-row">
        <button onclick="clearAllData()" class="btn-danger">🗑️ پاک کردن همه</button>
    </div>
</div>

<!-- ========== صفحه ۳: تاریخچه ========== -->
<div id="page-history" class="page">
    <div class="card">
        <h3>📜 تمام تراکنش‌ها</h3>
        <div id="historyContainer" class="history-list">
            <div class="empty-history">هیچ تراکنشی ثبت نشده</div>
        </div>
    </div>
</div>

<!-- ========== صفحه ۴: تنظیمات ========== -->
<div id="page-settings" class="page">
    <div class="card">
        <h3>⚙️ تنظیمات</h3>
        <div style="margin-top:12px;">
            <div style="display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid rgba(255,255,255,0.05);">
                <span style="color:#8899aa;">تعداد ارزها</span>
                <span style="font-weight:700;" id="settingsCurrencyCount">۰</span>
            </div>
            <div style="display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid rgba(255,255,255,0.05);">
                <span style="color:#8899aa;">تعداد تراکنش‌ها</span>
                <span style="font-weight:700;" id="settingsTransactionCount">۰</span>
            </div>
            <div style="display:flex; justify-content:space-between; padding:8px 0;">
                <span style="color:#8899aa;">نسخه</span>
                <span style="font-weight:700;">v3.1.0</span>
            </div>
        </div>
    </div>
    <div class="card">
        <h3>🔗 اتصال به والت</h3>
        <button onclick="alert('اتصال به والت (TON) به زودی...')" style="width:100%; padding:14px; border:none; border-radius:18px; background:linear-gradient(135deg,#3b82f6,#2563eb); color:#fff; font-weight:700; font-size:15px; cursor:pointer; margin-top:10px; box-shadow:0 4px 16px rgba(59,130,246,0.3); font-family:'Vazirmatn',sans-serif;">
            <i class="fas fa-wallet"></i> اتصال کیف پول
        </button>
    </div>
</div>

<!-- ========== منوی پایین ========== -->
<div class="bottom-nav">
    <div class="nav-item active" data-page="home" onclick="switchPage('home')">
        <i class="fas fa-home"></i>
        <span>خانه</span>
    </div>
    <div class="nav-item" data-page="wallet" onclick="switchPage('wallet')">
        <i class="fas fa-wallet"></i>
        <span>کیف پول</span>
    </div>
    <div class="nav-item" data-page="history" onclick="switchPage('history')">
        <i class="fas fa-clock"></i>
        <span>تاریخچه</span>
        <span class="badge-dot" id="historyBadge" style="display:none;"></span>
    </div>
    <div class="nav-item" data-page="settings" onclick="switchPage('settings')">
        <i class="fas fa-sliders-h"></i>
        <span>تنظیمات</span>
    </div>
</div>

<script>
    // ========== وضعیت ==========
    let currencies = [
        { id: 'rial', label: 'ریال', symbol: '🇮🇷', amount: 0, isCrypto: false },
        { id: 'usdt', label: 'تتر', symbol: '₿', amount: 0, isCrypto: true },
        { id: 'bitcoin', label: 'بیت‌کوین', symbol: '₿', amount: 0, isCrypto: true },
        { id: 'ethereum', label: 'اتریوم', symbol: '⟠', amount: 0, isCrypto: true }
    ];
    let prices = {};
    let rialRate = 58000;
    let transactions = [];
    let chartInstance = null;

    // ========== دریافت نرخ ارزها (با پروکسی رایگان) ==========
    async function fetchRates() {
        const cryptoIds = currencies.filter(c => c.isCrypto).map(c => c.id).join(',');
        if (!cryptoIds) return;
        try {
            // استفاده از پروکسی رایگان برای دور زدن محدودیت‌ها
            const proxyUrl = 'https://api.allorigins.win/raw?url=';
            const targetUrl = `https://api.coingecko.com/api/v3/simple/price?ids=${cryptoIds}&vs_currencies=usd`;
            const res = await fetch(proxyUrl + encodeURIComponent(targetUrl));
            const data = await res.json();
            for (let id in data) {
                prices[id] = data[id].usd || 0;
            }
            
            // دریافت نرخ ریال از بازار آزاد (با پروکسی)
            try {
                const rialRes = await fetch(proxyUrl + encodeURIComponent('https://api.coingecko.com/api/v3/simple/price?ids=tether&vs_currencies=usd'));
                const rialData = await rialRes.json();
                // نرخ ریال رو از یه منبع دیگه میگیریم (اینجا از همون تتر استفاده میکنیم)
                // در صورت دسترسی به api.nerkh.io یا منابع دیگه، میتونیم بهبود بدیم
                // فعلاً همون نرخ ثابت رو نگه میداریم ولی نمایشش نمیدیم
            } catch (e) {
                console.log('نرخ ریال دریافت نشد');
            }
            
            updateRateDisplay();
        } catch (error) {
            document.getElementById('rateDisplay').innerHTML = '⚠️ عدم دریافت نرخ لحظه‌ای';
            console.log('خطا در دریافت نرخ:', error);
        }
    }

    function updateRateDisplay() {
        let html = '';
        for (let c of currencies) {
            if (c.isCrypto && prices[c.id]) {
                html += `${c.symbol} ${c.label}: <span>$${prices[c.id].toLocaleString()}</span> | `;
            }
        }
        // نمایش قیمت تتر به عنوان نرخ مبنا
        if (prices['usdt']) {
            html += `💵 نرخ تتر: <span>$${prices['usdt']}</span>`;
        }
        document.getElementById('rateDisplay').innerHTML = html || '📈 در حال دریافت نرخ...';
    }

    // ========== ذخیره/بازیابی ==========
    function saveData() {
        localStorage.setItem('portfolio_data', JSON.stringify({ currencies, transactions }));
    }

    function loadData() {
        const saved = localStorage.getItem('portfolio_data');
        if (saved) {
            try {
                const data = JSON.parse(saved);
                currencies = data.currencies;
                transactions = data.transactions || [];
            } catch {}
        }
    }

    // ========== رندر ارزها ==========
    function renderCurrencies() {
        const container = document.getElementById('currenciesContainer');
        container.innerHTML = '';
        for (let i = 0; i < currencies.length; i++) {
            const c = currencies[i];
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <h3>${c.symbol} ${c.label}</h3>
                <div class="value" id="value-${c.id}">${c.amount.toLocaleString()}</div>
                <div class="input-row">
                    <input type="number" id="input-${c.id}" placeholder="مقدار ${c.label}">
                    <div class="btn-group">
                        <button class="deposit" onclick="updateAmount('${c.id}','deposit')">➕ واریز</button>
                        <button class="withdraw" onclick="updateAmount('${c.id}','withdraw')">➖ برداشت</button>
                        ${currencies.length > 1 ? `<button class="remove-btn" onclick="removeCurrency('${c.id}')">🗑️</button>` : ''}
                    </div>
                </div>
            `;
            container.appendChild(card);
        }
        updateTotal();
        updateHistory();
        updateChart();
        updateSettings();
        saveData();
    }

    // ========== واریز/برداشت ==========
    function updateAmount(id, type) {
        const currency = currencies.find(c => c.id === id);
        if (!currency) return;
        const input = document.getElementById(`input-${id}`);
        const amount = parseFloat(input.value);
        if (!amount || amount <= 0) return alert('مقدار معتبر وارد کن');
        if (type === 'withdraw' && amount > currency.amount) {
            alert(`موجودی کافی نیست! موجودی: ${currency.amount.toLocaleString()}`);
            return;
        }
        currency.amount = type === 'deposit' ? currency.amount + amount : currency.amount - amount;
        input.value = '';
        transactions.push({
            label: `${type === 'deposit' ? '➕' : '➖'} ${currency.symbol} ${currency.label} ${type === 'deposit' ? '+' : '-'}${amount.toLocaleString()}`,
            amount: amount,
            type: type,
            date: new Date().toLocaleString('fa-IR')
        });
        renderCurrencies();
        document.getElementById('historyBadge').style.display = 'block';
    }

    // ========== افزودن/حذف ارز ==========
    function addNewCurrency() {
        const input = document.getElementById('newCurrencyInput');
        const id = input.value.trim().toLowerCase();
        if (!id) return alert('شناسه ارز رو وارد کن');
        if (currencies.find(c => c.id === id)) return alert('این ارز قبلاً اضافه شده');
        fetch(`https://api.coingecko.com/api/v3/coins/${id}`)
            .then(res => res.json())
            .then(data => {
                const symbol = data.symbol ? data.symbol.toUpperCase() : id.slice(0,3).toUpperCase();
                currencies.push({
                    id: id,
                    label: data.name || id,
                    symbol: symbol,
                    amount: 0,
                    isCrypto: true
                });
                input.value = '';
                renderCurrencies();
                fetchRates();
            })
            .catch(() => alert('ارز پیدا نشد! شناسه رو چک کن.'));
    }

    function removeCurrency(id) {
        if (currencies.length <= 1) return alert('حداقل یک ارز باید باقی بمونه');
        if (!confirm(`ارز ${id} حذف بشه؟`)) return;
        currencies = currencies.filter(c => c.id !== id);
        renderCurrencies();
        fetchRates();
    }

    // ========== مجموع ==========
    function updateTotal() {
        let totalUsd = 0;
        for (let c of currencies) {
            if (c.id === 'rial') {
                // ریال رو با نرخ ثابت ۵۸۰۰۰ به دلار تبدیل میکنیم (برای محاسبه)
                totalUsd += c.amount / 58000;
            } else if (c.isCrypto && prices[c.id]) {
                totalUsd += c.amount * prices[c.id];
            } else if (c.id === 'usdt') {
                totalUsd += c.amount * 1;
            }
        }
        const totalRial = totalUsd * 58000;
        document.getElementById('totalRial').textContent = totalRial.toLocaleString() + ' تومان';
        document.getElementById('totalUsd').textContent = `≈ ${totalUsd.toFixed(2)} تتر`;
    }

    // ========== تاریخچه ==========
    function updateHistory() {
        const container = document.getElementById('historyContainer');
        if (transactions.length === 0) {
            container.innerHTML = '<div class="empty-history">هیچ تراکنشی ثبت نشده</div>';
            return;
        }
        let html = '';
        const reversed = [...transactions].reverse().slice(0, 30);
        for (let t of reversed) {
            const cls = t.type === 'withdraw' ? 'withdraw-amount' : 'deposit-amount';
            html += `
                <div class="history-item">
                    <span>${t.label}</span>
                    <span>
                        <span class="amount ${cls}">${t.type === 'withdraw' ? '-' : '+'}${t.amount.toLocaleString()}</span>
                        <span class="date">${t.date}</span>
                    </span>
                </div>
            `;
        }
        container.innerHTML = html;
        document.getElementById('historyBadge').style.display = transactions.length > 0 ? 'block' : 'none';
    }

    // ========== نمودار ==========
    function updateChart() {
        const ctx = document.getElementById('portfolioChart').getContext('2d');
        const data = [], labels = [];
        const colors = ['#f59e0b','#26a17b','#f7931a','#627eea','#8b5cf6','#ec4899','#14b8a6','#f97316'];
        for (let c of currencies) {
            let val = 0;
            if (c.id === 'rial') val = c.amount / 58000;
            else if (c.isCrypto && prices[c.id]) val = c.amount * prices[c.id];
            else if (c.id === 'usdt') val = c.amount * 1;
            if (val > 0) { data.push(val); labels.push(c.label); }
        }
        if (chartInstance) chartInstance.destroy();
        if (data.length === 0) {
            chartInstance = new Chart(ctx, {
                type: 'doughnut',
                data: { labels: ['بدون داده'], datasets: [{ data: [1], backgroundColor: ['rgba(45,55,72,0.5)'] }] },
                options: { cutout: '70%', plugins: { legend: { display: false } } }
            });
            return;
        }
        chartInstance = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: labels,
                datasets: [{
                    data: data,
                    backgroundColor: colors.slice(0, data.length),
                    borderColor: '#0a0c12',
                    borderWidth: 3,
                    hoverOffset: 10
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: {
                        position: 'bottom',
                        labels: {
                            color: '#b0c4db',
                            font: { size: 11, family: 'Vazirmatn' },
                            boxWidth: 12,
                            padding: 12
                        }
                    }
                },
                cutout: '72%'
            }
        });
    }

    // ========== تنظیمات ==========
    function updateSettings() {
        document.getElementById('settingsCurrencyCount').textContent = currencies.length;
        document.getElementById('settingsTransactionCount').textContent = transactions.length;
    }

    // ========== پاک کردن ==========
    function clearAllData() {
        if (!confirm('همه داده‌ها پاک میشن؟')) return;
        for (let c of currencies) c.amount = 0;
        transactions = [];
        localStorage.clear();
        renderCurrencies();
        document.querySelectorAll('.input-row input').forEach(inp => inp.value = '');
    }

    // ========== تغییر صفحه ==========
    function switchPage(page) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(`page-${page}`).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.querySelector(`.nav-item[data-page="${page}"]`).classList.add('active');
        if (page === 'home') { updateTotal(); updateChart(); }
        if (page === 'history') updateHistory();
        if (page === 'settings') updateSettings();
    }

    // ========== شروع ==========
    loadData();
    renderCurrencies();
    fetchRates();
    setInterval(fetchRates, 60000);
</script>
</body>
</html>
